<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#04050a" />
<meta name="application-name" content="Dragon Dash" />
<meta name="apple-mobile-web-app-title" content="Dragon Dash" />
<meta name="description" content="ドラゴンを操作してトンネルを駆け抜ける Babylon.js 製の3Dランゲーム。" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" type="image/png" href="./icons/favicon.png" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
<title>🐉 DRAGON DASH — LEGO Dragon Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body { position: fixed; inset: 0; width: 100%; height: 100%; height: 100dvh; overflow: hidden; overscroll-behavior: none; touch-action: none; background: #04050a; font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", sans-serif; color:#fff; }
  #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; -webkit-touch-callout: none; }

  #fx { position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: 0; transition: opacity .15s;
        background: radial-gradient(ellipse 75% 65% at 50% 50%, transparent 60%, rgba(255,120,40,.08) 82%, rgba(255,60,20,.20) 100%); }
  #hitfx { position: fixed; inset: 0; z-index: 11; pointer-events: none; opacity: 0; transition: opacity .25s;
        background: radial-gradient(ellipse at 50% 50%, transparent 42%, rgba(255,20,20,.5) 100%); }
  #healfx { position: fixed; inset: 0; z-index: 11; pointer-events: none; opacity: 0; transition: opacity .25s;
        background: radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(40,255,120,.4) 100%); }

  .overlay { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; background: radial-gradient(circle at 50% 38%, rgba(22,30,52,.5), rgba(3,5,11,.92)); backdrop-filter: blur(4px); }
  .overlay.hidden { display: none; }
  .panel { background: rgba(14,19,33,.82); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 30px 40px; max-width: 92vw; max-height: 92vh; overflow:auto; box-shadow: 0 30px 80px rgba(0,0,0,.5); }
  .panel h1 { font-size: 38px; font-weight: 900; letter-spacing: .03em; margin-bottom: 6px; background: linear-gradient(90deg,#ffd23a,#ff7a2f,#ff3d5d); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 16px rgba(255,90,40,.5)); animation: glow 2.4s ease-in-out infinite; }
  @keyframes glow { 0%,100%{filter:drop-shadow(0 0 12px rgba(255,90,40,.4))} 50%{filter:drop-shadow(0 0 24px rgba(255,140,40,.8))} }
  .panel h2 { font-size: 28px; margin-bottom: 8px; color: #ff7a5a; letter-spacing:.08em; }
  .panel p { font-size: 13px; color: #b9c2d2; line-height: 1.8; margin: 5px 0; }
  .panel .big { font-size: 46px; font-weight: 900; color: #fff; margin: 6px 0; text-shadow: 0 0 22px rgba(255,120,40,.55); }
  .keys { margin-top: 12px; font-size: 12px; color: #8d97a8; }
  kbd { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); border-radius: 6px; padding: 2px 7px; font-family: ui-monospace, monospace; font-size: 11px; }
  .btn { margin-top: 18px; font: inherit; font-size: 18px; font-weight: 800; color: #fff; cursor: pointer; background: linear-gradient(90deg,#ff8a33,#ff2f5d); border: none; border-radius: 14px; padding: 15px 44px; min-height: 52px; box-shadow: 0 10px 28px rgba(255,60,80,.4); transition: transform .12s, box-shadow .12s; letter-spacing:.05em; touch-action: manipulation; }
  .btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 16px 38px rgba(255,60,80,.55); }
  .btn:active { transform: translateY(0); }
  .btn-install { margin-top: 12px; font-size: 16px; padding: 13px 30px; min-height: 48px; background: linear-gradient(90deg,#2f9bff,#7a5cff); box-shadow: 0 10px 28px rgba(60,120,255,.4); }
  .btn-install:hover { box-shadow: 0 16px 38px rgba(60,120,255,.55); }
  .install-hint { margin-top: 12px; font-size: 12px; color: #9fb4d6; line-height: 1.7; }
  .install-hint b { color: #cfe0ff; font-size: 14px; }

  .roster { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
  .chip { font-size:10px; padding:3px 8px; border-radius:20px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); color:#cfd6e2; }

  #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 15; display: flex; justify-content: space-between; align-items: flex-start;
         padding: calc(12px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 12px calc(16px + env(safe-area-inset-left)); pointer-events: none; }
  #hud.hidden { display: none; }
  .hud-box { background: rgba(8,12,22,.5); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 8px 14px; backdrop-filter: blur(6px); }
  #dist { font-size: 11px; color: #9aa6b6; letter-spacing:.1em; }
  #dist b { font-size: clamp(22px, 6vw, 30px); color: #fff; font-weight: 900; display: block; line-height: 1.05; text-shadow:0 0 14px rgba(120,180,255,.5); }
  #lives { font-size: clamp(20px, 5.5vw, 26px); letter-spacing: 3px; }
  #speed { font-size: 13px; font-weight:800; color: #ffb070; margin-top: 5px; text-align: right; letter-spacing:.06em; transition: color .2s; }
  #speed.boost { color:#ff4d6d; text-shadow:0 0 12px rgba(255,77,109,.8); }
  #combo { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index:15; color:#ffd27a; font-size:15px; font-weight:800; opacity:0; transition:opacity .3s; pointer-events:none; letter-spacing:.1em;}
  #toast { position: fixed; top: 46%; left: 50%; transform: translate(-50%,-50%) scale(.6); z-index: 16; font-size: 38px; font-weight: 900; text-shadow: 0 4px 20px rgba(0,0,0,.6); opacity: 0; transition: opacity .15s, transform .15s; pointer-events: none; white-space:nowrap; }
  /* menu (start screen) shown over the live 3D showcase */
  #startScreen.menu { background: linear-gradient(to top, rgba(3,5,11,.8), rgba(3,5,11,.15) 32%, transparent 58%); backdrop-filter: none; pointer-events: none; justify-content: flex-end; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  #startScreen.menu .panel { pointer-events: auto; padding: 16px 30px 20px; max-width: min(720px, 95vw); overflow: visible; }
  #startScreen.menu .panel h1 { font-size: 30px; margin-bottom: 2px; }
  #startScreen.menu .panel p { margin: 3px 0; }
  .drag-hint { font-size: 13px; color: #9fe0ff; margin-top: 6px; }
  .spinner { width:56px; height:56px; margin:0 auto; border-radius:50%; border:5px solid rgba(255,255,255,.15); border-top-color:#ff7a33; border-right-color:#ff3d5d; animation:spin .85s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingScreen .bar { width:min(280px,70vw); height:8px; margin:16px auto 0; border-radius:6px; background:rgba(255,255,255,.1); overflow:hidden; }
  #loadingScreen .bar > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#ff8a33,#ff3d5d); transition:width .25s; }
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="fx"></div>
<div id="hitfx"></div>
<div id="healfx"></div>

<div id="hud" class="hidden">
  <div class="hud-box" id="dist">DISTANCE<b>0 m</b></div>
  <div class="hud-box" style="text-align:right">
    <div id="lives">❤️❤️❤️</div>
    <div id="speed">SPEED 1.0x</div>
  </div>
</div>
<div id="combo"></div>
<div id="toast"></div>

<div id="loadingScreen" class="overlay">
  <div class="panel" style="background:transparent;border:none;box-shadow:none">
    <div class="spinner"></div>
    <h2 style="color:#ffb070;margin-top:20px">🐉 LOADING…</h2>
    <p id="loadingPct" style="color:#cfd6e2">ドラゴンと仲間たちを読み込み中… 0%</p>
    <div class="bar"><i id="loadingBar"></i></div>
  </div>
</div>

<div id="startScreen" class="overlay menu hidden">
  <div class="panel">
    <h1>🐉 DRAGON DASH</h1>
    <p style="color:#ff9a6a">敵に3回ぶつかるとゲームオーバー。緑の💚で体力回復！</p>
    <p class="drag-hint">🖐️ モデルをドラッグでグリグリ ・ ピンチでズーム</p>
    <div class="roster" id="roster"></div>
    <p id="menuBest" style="color:#ffd27a">🏆 自己ベスト 0 m</p>
    <div class="keys">操作 : <b>スワイプした方向へ動き続けます</b>・指を戻すか離すと停止（マウスはドラッグ）</div>
    <button class="btn" id="startBtn">▶ スタート / タップで開始</button>
    <button class="btn btn-install hidden" id="installBtn">📲 アプリとしてインストール</button>
    <p class="install-hint hidden" id="iosInstallHint">📲 ホーム画面に追加：共有ボタン <b>􀈂</b> →「ホーム画面に追加」</p>
  </div>
</div>

<div id="overScreen" class="overlay hidden">
  <div class="panel">
    <h2>GAME OVER</h2>
    <p>とうたつ距離</p>
    <div class="big" id="finalDist">0 m</div>
    <p id="newRecord" class="hidden" style="color:#46ff8c;font-weight:800;font-size:15px">🎉 自己ベスト更新！</p>
    <p id="bestDist" style="color:#ffd27a">🏆 自己ベスト 0 m</p>
    <button class="btn" id="retryBtn">↻ もう一度</button>
  </div>
</div>

<script src="./lib/babylon.js"></script>
<script src="./lib/babylonjs.loaders.min.js"></script>
<script>
/* ---- PWA: service worker registration + install prompt ---------------- */
(function setupPWA() {
  // Register the service worker for offline play / installability.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch((e) => console.warn('SW register failed', e));
    });
  }

  const installBtn = document.getElementById('installBtn');
  const iosHint = document.getElementById('iosInstallHint');
  let deferredPrompt = null;

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.matchMedia('(display-mode: fullscreen)').matches ||
                       window.navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  // Android / desktop Chromium: capture the install prompt and show our button.
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.classList.remove('hidden');
  });

  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      try { await deferredPrompt.userChoice; } catch (_) {}
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });
  }

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    if (installBtn) installBtn.classList.add('hidden');
    if (iosHint) iosHint.classList.add('hidden');
  });

  // iOS Safari has no beforeinstallprompt — show manual "Add to Home Screen" hint.
  if (isIOS && !isStandalone && iosHint) {
    iosHint.classList.remove('hidden');
  }
})();
/* ---------------------------------------------------------------------- */

const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true, antialias: true });
engine.setHardwareScalingLevel(1 / Math.min(window.devicePixelRatio || 1, 2));

// ---------- config ----------
const LANE_W = 15, LANE_H = 9, Y_CENTER = 7;     // wider play area
const SPAWN_AHEAD = 120, RECYCLE_BEHIND = 16, NUM_OBSTACLES = 26;
const BASE_SPEED = 30, MAX_SPEED = BASE_SPEED * 3.4;
const HIT_Z = 1.8, HIT_R = 1.9, INVULN_TIME = 1.5;
const DRAGON_YAW = -Math.PI / 2;     // facing (yaw 90° right). flip sign if it faces backwards.
const ROLL_SIGN = -1, PITCH_SIGN = -1; // banking direction. flip a sign if that axis feels reversed.
const DRAGON_BRIGHT = 0.42, ENEMY_BRIGHT = 0.42;
const INTRO_DUR = 3.8;

const ENEMIES = [
  { file:'tarantula_dragon.glb', name:'タランチュラドラゴン' },
  { file:'kira.glb',            name:'キーラ' },
  { file:'hero_main.glb',       name:'主人公' },
  { file:'brave.glb',           name:'勇者' },
  { file:'golem.glb',           name:'岩のゴーレム' },
  { file:'evil_spirit.glb',     name:'悪い精霊' },
];

// ---------- stages ----------
// distance-driven progression: 0-2000 → 1st, 2000-4000 → 2nd, 4000+ → 3rd
// 1st: マグマだまり / 2nd: 岩の草原 / 3rd: 宇宙空間 — built from free CC0 PBR
// textures (ambientCG Lava004) + HDRI/panorama skyboxes (Poly Haven / ESO).
// `.floor` / `.sky` are filled in by buildStageMaterials()/loadSkies().
const STAGE_LEN = 2000;
const STAGES = [
  { name:'マグマだまり', sub:'MAGMA CHAMBER', emoji:'🌋', toast:'#ff8a3a',
    floor:null, sky:0, env:0.55,
    clear:[0.06,0.02,0.01], fog:[0.26,0.06,0.03], fogStart:55, fogEnd:210,
    streak:[1.0,0.50,0.20], gate:[1.0,0.45,0.10], glow:[1.0,0.50,0.20],
    hemi:[0.50,0.28,0.22], hemiInt:0.7, dir:[1.0,0.55,0.30], dirInt:1.3 },
  { name:'岩の草原', sub:'ROCKY PLAINS', emoji:'🌿', toast:'#69e36b',
    floor:null, sky:1, env:1.15,
    clear:[0.55,0.70,0.85], fog:[0.70,0.82,0.92], fogStart:120, fogEnd:330,
    streak:[0.85,1.0,0.85], gate:[0.40,1.0,0.50], glow:[0.60,1.0,0.60],
    hemi:[0.60,0.66,0.60], hemiInt:1.0, dir:[1.0,0.97,0.85], dirInt:2.2 },
  { name:'宇宙空間', sub:'DEEP SPACE', emoji:'🌌', toast:'#9b8cff',
    floor:null, sky:2, env:0.40,
    clear:[0.0,0.0,0.02], fog:[0.01,0.01,0.04], fogStart:280, fogEnd:900,
    streak:[0.90,0.95,1.0], gate:[0.60,0.40,1.0], glow:[0.50,0.50,1.0],
    hemi:[0.20,0.22,0.40], hemiInt:0.35, dir:[0.60,0.65,1.0], dirInt:0.5 },
];
function stageForDistance(d) { return Math.min(STAGES.length - 1, Math.floor(d / STAGE_LEN)); }

// ---------- state ----------
let scene, camera, showcaseCam, pipeline, dragonRoot, dragonBank, dragonFacing, dragonGlow, fireTrail, sparkBurst;
let hemiLight, dirLight, fillLight;
let tunnelFloors = [], tunnelCeils = [], stageSkies = [], skybox, skyMat, streakMat = null;
let currentStageIndex = -1, stageTgt = STAGES[0];
let obstacles = [], heals = [], gates = [], streaks = [];
let templates = [];
let dragonModelRoot = null;
let showcaseRoot = null, showcaseItems = [], showcaseBuilt = false;
const SHOWCASE_CENTER = () => new BABYLON.Vector3(0, Y_CENTER, 5);
let phase = 'loading';        // loading | intro | menu | playing | over
let introT = 0;
let assetsLoaded = 0;
const assetsTotal = 1 + 6;    // dragon + 6 enemies
let dragonReady = false;
let quickPlay = false;
let lives = 3, distance = 0, speed = BASE_SPEED, invuln = 0, shake = 0, camRoll = 0, dodgeCombo = 0, comboTimer = 0;
let nextHealAt = 600;
let target = { x: 0, y: Y_CENTER };
const keys = {};
let pointerDown = false;
let anchorX = 0, anchorY = 0;    // where the current swipe began (screen px)
let dragVX = 0, dragVY = 0;      // swipe-joystick steering velocity (lane units/s)
const $ = id => document.getElementById(id);

// ---------- scene ----------
function createScene() {
  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.07, 0.11, 0.20, 1);     // lighter dusk-blue, not near-black
  scene.fogMode = BABYLON.Scene.FOGMODE_LINEAR;
  scene.fogColor = new BABYLON.Color3(0.12, 0.17, 0.28);
  scene.fogStart = 95; scene.fogEnd = 175;                         // push fog back so obstacles read early

  camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, Y_CENTER + 3, -12), scene);
  camera.fov = 1.15; camera.minZ = 0.3; camera.maxZ = 2200;   // maxZ holds the skybox

  // orbit camera for the start-screen model showcase (mouse drag to spin around)
  showcaseCam = new BABYLON.ArcRotateCamera("showcam", -Math.PI/2, Math.PI/2.25, 30,
    SHOWCASE_CENTER(), scene);
  showcaseCam.lowerRadiusLimit = 12; showcaseCam.upperRadiusLimit = 48;
  showcaseCam.wheelPrecision = 18; showcaseCam.panningSensibility = 0; showcaseCam.minZ = 0.1; showcaseCam.maxZ = 2200;
  showcaseCam.fov = 1.0;

  hemiLight = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0.2, 1, 0.3), scene);
  hemiLight.intensity = 1.7; hemiLight.groundColor = new BABYLON.Color3(0.34, 0.38, 0.5);
  dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-0.4, -0.8, 0.55), scene);
  dirLight.intensity = 2.2; dirLight.position = new BABYLON.Vector3(20, 40, -20);
  fillLight = new BABYLON.DirectionalLight("fill", new BABYLON.Vector3(0.2, -0.1, -1), scene);
  fillLight.intensity = 0.4; fillLight.diffuse = new BABYLON.Color3(1.0, 0.95, 0.85);   // mild; IBL does the heavy lifting

  dragonGlow = new BABYLON.PointLight("dglow", new BABYLON.Vector3(0, Y_CENTER, 0), scene);
  dragonGlow.diffuse = new BABYLON.Color3(1.0, 0.6, 0.25); dragonGlow.intensity = 1.2; dragonGlow.range = 26;

  const gl = new BABYLON.GlowLayer("glow", scene); gl.intensity = 0.8;   // makes the molten lava cracks bloom

  setupPipeline();
  buildSky(); buildTunnel(); buildWarp(); buildGates();

  dragonRoot = new BABYLON.TransformNode("dragonRoot", scene);
  dragonBank = new BABYLON.TransformNode("dragonBank", scene); dragonBank.parent = dragonRoot;     // roll/pitch (world frame)
  dragonFacing = new BABYLON.TransformNode("dragonFacing", scene); dragonFacing.parent = dragonBank; // constant yaw
  dragonFacing.rotation.y = DRAGON_YAW;

  loadSkies();
  buildStageMaterials();
  applyStage(0, false);
  setStageTint(1);          // snap scene tint to the 1st stage at boot

  loadDragon();
  buildFireTrail();
  buildHeals();
  loadEnemies();
  buildObstacles(false);   // boxes until models ready
  return scene;
}

function setupPipeline() {
  pipeline = new BABYLON.DefaultRenderingPipeline("rp", true, scene, [camera, showcaseCam]);
  pipeline.fxaaEnabled = true;
  pipeline.bloomEnabled = true;
  pipeline.bloomThreshold = 0.9; pipeline.bloomWeight = 0.22; pipeline.bloomKernel = 40; pipeline.bloomScale = 0.5;
  pipeline.chromaticAberrationEnabled = true;
  pipeline.chromaticAberration.aberrationAmount = 0.8;
  pipeline.grainEnabled = false;
  pipeline.imageProcessingEnabled = true;
  const ip = pipeline.imageProcessing;
  ip.toneMappingEnabled = true; ip.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
  ip.exposure = 1.2; ip.contrast = 1.1;
  ip.vignetteEnabled = true; ip.vignetteWeight = 0.6; ip.vignetteStretch = 0.3;
  ip.vignetteColor = new BABYLON.Color4(0.05, 0.07, 0.16, 1);
}

let tunnelTiles = [];
function buildTunnel() {
  // material per surface is assigned by applyStage(); meshes just provide geometry.
  for (let i = 0; i < 2; i++) {
    const g = BABYLON.MeshBuilder.CreateGround("grnd"+i, { width: LANE_W*2.6, height: 230, subdivisions: 28 }, scene);
    g.position.y = Y_CENTER - LANE_H - 1.6; g.position.z = i*230; tunnelTiles.push(g); tunnelFloors.push(g);
    const c = g.clone("ceil"+i); c.position.y = Y_CENTER + LANE_H + 1.6; tunnelTiles.push(c); tunnelCeils.push(c);
  }
}

// ---- skyboxes (real CC0 HDRI / panorama backgrounds) ----
function buildSky() {
  skybox = BABYLON.MeshBuilder.CreateBox("skyBox", { size: 1000 }, scene);
  skybox.infiniteDistance = true; skybox.isPickable = false; skybox.applyFog = false; skybox.renderingGroupId = 0;
  skyMat = new BABYLON.StandardMaterial("skyBoxMat", scene);
  skyMat.backFaceCulling = false; skyMat.disableLighting = true;
  skyMat.diffuseColor = new BABYLON.Color3(0,0,0); skyMat.specularColor = new BABYLON.Color3(0,0,0);
  skybox.material = skyMat;
}
function loadSkies() {
  // 1st マグマだまり: volcanic-cavern panorama (smoky ceiling + glowing molten horizon)
  stageSkies[0] = new BABYLON.EquiRectangularCubeTexture("./assets/sky/magma.jpg", scene, 1024);
  // 2nd 岩の草原: partly-cloudy blue sky (Poly Haven "kloofendal_48d_partly_cloudy_puresky", CC0)
  // args: url, scene, size, noMipmap=false, generateHarmonics=true, gammaSpace=false, prefilterOnLoad=true
  stageSkies[1] = new BABYLON.HDRCubeTexture("./assets/sky/grass.hdr", scene, 512, false, true, false, true);
  // 3rd 宇宙空間: real all-sky Milky Way panorama (ESO/S.Brunier, CC BY 4.0)
  stageSkies[2] = new BABYLON.EquiRectangularCubeTexture("./assets/sky/space.jpg", scene, 1024);
  stageSkies.forEach(t => { t.coordinatesMode = BABYLON.Texture.SKYBOX_MODE; });
}

// ---- ground PBR materials (real CC0 textures) ----
function gTex(file, u, v, linear) {
  const t = new BABYLON.Texture(file, scene);
  t.uScale = u; t.vScale = v;
  t.wrapU = t.wrapV = BABYLON.Texture.WRAP_ADDRESSMODE;
  if (linear) t.gammaSpace = false;     // normal / roughness are data, not colour
  return t;
}
function pbrRoughness(mat, file, u, v) {
  mat.metallic = 0; mat.roughness = 1;
  mat.metallicTexture = gTex(file, u, v, true);
  mat.useRoughnessFromMetallicTextureGreen = true;
  mat.useRoughnessFromMetallicTextureAlpha = false;

function buildStageMaterials() {
  // ── 1st: マグマだまり — ambientCG "Lava004" PBR (colour + normal + roughness + glowing emission) ──
  const U1 = 5, V1 = 30;
  const lava = new BABYLON.PBRMaterial("lavaGround", scene);
  lava.albedoTexture = gTex("./assets/ground/lava_color.jpg", U1, V1);

  lava.emissiveTexture = gTex("./assets/ground/lava_emit.jpg", U1, V1);
  lava.emissiveColor = new BABYLON.Color3(1, 1, 1); lava.emissiveIntensity = 1.0;   // glowing cracks only (bloom via GlowLayer); keep basalt dark
  lava.environmentIntensity = 0.55;

  const U2 = 7, V2 = 34;

}

function applyStage(i, announce) {
  if (i === currentStageIndex) return;
  currentStageIndex = i;
  const st = STAGES[i];
  // floor: lava / grass visible, space has none. ceiling is always replaced by the skybox.
  tunnelFloors.forEach(f => { if (st.floor) f.material = st.floor; f.setEnabled(!!st.floor); });
  tunnelCeils.forEach(c => c.setEnabled(false));
  // swap the live skybox + image-based lighting
  const sky = stageSkies[st.sky];
  if (sky) { skyMat.reflectionTexture = sky; scene.environmentTexture = sky; }
  stageTgt = st;
  if (announce) { flashToast(st.emoji + ' ' + st.name, st.toast); flashCombo('STAGE ' + (i+1) + ' — ' + st.sub); }
}

function lerpRGB(col, arr, k) { col.r += (arr[0]-col.r)*k; col.g += (arr[1]-col.g)*k; col.b += (arr[2]-col.b)*k; }
function setStageTint(k) {
  const t = stageTgt;
  lerpRGB(scene.clearColor, t.clear, k);
  lerpRGB(scene.fogColor, t.fog, k);
  scene.fogStart += (t.fogStart - scene.fogStart)*k;
  scene.fogEnd   += (t.fogEnd   - scene.fogEnd)*k;
  lerpRGB(hemiLight.diffuse, t.hemi, k); hemiLight.intensity += (t.hemiInt - hemiLight.intensity)*k;
  lerpRGB(dirLight.diffuse, t.dir, k);   dirLight.intensity += (t.dirInt - dirLight.intensity)*k;
  lerpRGB(dragonGlow.diffuse, t.glow, k);
  scene.environmentIntensity += (t.env - (scene.environmentIntensity || 0))*k;
  if (streakMat) lerpRGB(streakMat.emissiveColor, t.streak, k);
}

function buildWarp() {

  m.alpha = 0.6; streakMat = m;
  const proto = BABYLON.MeshBuilder.CreateBox("streakP", { width: 0.04, height: 0.04, depth: 1 }, scene);
  proto.material = m; proto.isVisible = false;
  for (let i = 0; i < 110; i++) { const s = proto.createInstance("st"+i); resetStreak(s, Math.random()*SPAWN_AHEAD); streaks.push(s); }
}
function resetStreak(s, z) {
  // keep streaks OUT at the tunnel walls so they never overlap the enemy play-zone
  const a = Math.random()*Math.PI*2, r = 24 + Math.random()*40;
  s.position.set(Math.cos(a)*r, Y_CENTER + Math.sin(a)*r*0.6, z); s.basePhase = Math.random();

function buildGates() {

let haloTex = null;
function createHalo() {
  if (haloTex) return haloTex;
  const sz = 128, dt = new BABYLON.DynamicTexture("halo", sz, scene, false);
  const ctx = dt.getContext();
  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
  g.addColorStop(0, "rgba(255,210,130,0.55)"); g.addColorStop(0.45, "rgba(255,120,50,0.35)");
  g.addColorStop(0.75, "rgba(255,70,40,0.12)"); g.addColorStop(1, "rgba(255,60,30,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,sz,sz); dt.hasAlpha = true; dt.update();
  haloTex = dt; return dt;
}
function attachHalo(node, size) {

  p.parent = node; p.position.set(0, 0, 0); p.renderingGroupId = 0;

function createFlare() {
  const sz = 128, dt = new BABYLON.DynamicTexture("flare", sz, scene, false);

  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
  g.addColorStop(0, "rgba(255,255,255,1)"); g.addColorStop(0.35, "rgba(255,220,150,0.85)");
  g.addColorStop(0.7, "rgba(255,120,40,0.25)"); g.addColorStop(1, "rgba(255,80,20,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,sz,sz); dt.hasAlpha = true; dt.update(); return dt;
}

function brighten(meshes, f) {
  meshes.forEach(m => {
    const mat = m.material; if (!mat) return;
    if (mat.getClassName && mat.getClassName().indexOf("PBR") >= 0) {
      if (mat.albedoTexture) { mat.emissiveTexture = mat.albedoTexture; mat.emissiveColor = new BABYLON.Color3(f,f,f); }
      else if (mat.albedoColor) mat.emissiveColor = mat.albedoColor.scale(f + 0.2);
      mat.metallic = 0.05; mat.roughness = 0.9; mat.environmentIntensity = 1.2;
    } else {
      if (mat.diffuseTexture) { mat.emissiveTexture = mat.diffuseTexture; mat.emissiveColor = new BABYLON.Color3(f,f,f); }
      else if (mat.diffuseColor) mat.emissiveColor = mat.diffuseColor.scale(f + 0.2);
      mat.specularColor = new BABYLON.Color3(0.25,0.25,0.25);
    }
  });
}

function normalizeImported(meshes, root, targetSize) {
  let mn = new BABYLON.Vector3(1e9,1e9,1e9), mx = new BABYLON.Vector3(-1e9,-1e9,-1e9);
  meshes.forEach(m => {
    if (!m.getTotalVertices || m.getTotalVertices() === 0) return;
    m.computeWorldMatrix(true);
    const bb = m.getBoundingInfo().boundingBox;
    mn = BABYLON.Vector3.Minimize(mn, bb.minimumWorld); mx = BABYLON.Vector3.Maximize(mx, bb.maximumWorld);
  });
  const size = mx.subtract(mn), maxDim = Math.max(size.x, size.y, size.z) || 1, scl = targetSize / maxDim;
  root.scaling.scaleInPlace(scl);
  root.position.subtractInPlace(mn.add(mx).scale(0.5).scale(scl));
}

function makeBox(i) {
  const COL = [[0.95,0.16,0.18],[0.98,0.55,0.10],[0.13,0.48,0.92],[0.16,0.72,0.34],[0.99,0.84,0.16],[0.66,0.26,0.86]];

function buildObstacles(useModels) {

      const t = templates[i % templates.length];
      node = t.holder.clone("obs"+i, null); node.setEnabled(true); node.name = "obs"+i;
    } else {
      node = makeBox(i);
    }
    node.metadata = { spin: (Math.random()*2-1)*0.04, scored: false };
    attachHalo(node, 5.5);   // warm danger aura so enemies stand out from the cool speed-lines

    obstacles.push(node);
  }

  m.position.y = Y_CENTER + (Math.random()*2-1) * (LANE_H - 1.2);
  m.position.z = baseZ + Math.random()*22;
  m.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
  if (m.metadata) m.metadata.scored = false;
}

  h.metadata.active = true; h.setEnabled(true);

function buildShowcase() {
  if (showcaseBuilt) return;
  showcaseBuilt = true;
  showcaseRoot = new BABYLON.TransformNode("showcaseRoot", scene);
  const C = SHOWCASE_CENTER();

  const sources = [];
  if (dragonModelRoot) sources.push({ node: dragonModelRoot, name: "ドラゴン (自機)", yaw: DRAGON_YAW });
  templates.forEach(t => sources.push({ node: t.holder, name: t.name, yaw: 0 }));

  const n = sources.length;
  sources.forEach((src, i) => {
    const theta = (i / n) * Math.PI * 2;
    const R = 9.5;
    const pivot = new BABYLON.TransformNode("scp"+i, scene);
    pivot.parent = showcaseRoot;
    pivot.position.set(C.x + Math.sin(theta)*R, C.y, C.z + Math.cos(theta)*R);
    pivot.scaling.set(1.45, 1.45, 1.45);

    const clone = src.node.clone("scm"+i, null);
    clone.setEnabled(true);
    clone.parent = pivot;
    clone.position.set(0, 0, 0);
    clone.rotation = new BABYLON.Vector3(0, src.yaw, 0);

    const label = makeLabel(src.name);
    label.parent = pivot;
    label.position.set(0, 2.6, 0);
    const k = 1/1.45; label.scaling.set(k, k, k);

    showcaseItems.push({ pivot, spin: function(){ this.pivot.rotation.y += 0.012; } });
  });
  showcaseRoot.setEnabled(false);
}

// ---------- game flow ----------
function resetGame() {
  lives = 3; distance = 0; speed = BASE_SPEED; invuln = 0; shake = 0; camRoll = 0; dodgeCombo = 0; comboTimer = 0;
  nextHealAt = 500 + Math.random()*400;
  target = { x: 0, y: Y_CENTER };
  pointerDown = false; dragVX = dragVY = 0;
  dragonRoot.position.set(0, Y_CENTER, 0);
  dragonBank.rotation.set(0,0,0);
  obstacles.forEach((m, i) => placeObstacle(m, 40 + (i / NUM_OBSTACLES) * SPAWN_AHEAD));
  heals.forEach(h => { h.metadata.active = false; h.setEnabled(false); });
  gates.forEach((g, i) => g.position.z = 150 + i*130);
  applyStage(0, false); setStageTint(1);   // back to the 1st stage (マグマだまり)
  updateHud();
}
function startGame() {
  leaveMenu();
  resetGame();
  $('startScreen').classList.add('hidden'); $('overScreen').classList.add('hidden');
  $('hud').classList.remove('hidden'); $('fx').style.opacity = 1;
  phase = 'playing';
}
function gameOver() {
  phase = 'over'; $('hud').classList.add('hidden'); $('fx').style.opacity = 0;
  if (sparkBurst) sparkBurst.manualEmitCount = 320;
  const d = Math.floor(distance);
  $('finalDist').textContent = d.toLocaleString() + ' m';
  const prevBest = getBest();
  const isNew = d > prevBest && d > 0;
  if (isNew) saveBest(d);
  $('newRecord').classList.toggle('hidden', !isNew);
  $('bestDist').textContent = '🏆 自己ベスト ' + getBest().toLocaleString() + ' m';
  $('overScreen').classList.remove('hidden');
}
function updateHud() {
  $('dist').innerHTML = 'DISTANCE<b>' + Math.floor(distance).toLocaleString() + ' m</b>';
  $('lives').textContent = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3 - lives));
  const mult = speed / BASE_SPEED; const sp = $('speed');
  sp.textContent = 'SPEED ' + mult.toFixed(1) + 'x'; sp.classList.toggle('boost', mult > 2.2);
}
function flashToast(t, color) {
  const el = $('toast'); el.textContent = t; el.style.color = color || '#fff';
  el.style.opacity = 1; el.style.transform = 'translate(-50%,-50%) scale(1.1)';
  clearTimeout(el._t); el._t = setTimeout(() => { el.style.opacity = 0; el.style.transform = 'translate(-50%,-50%) scale(.6)'; }, 650);
}
function flashCombo(text) {
  const el = $('combo'); el.textContent = text;
  el.style.opacity = 1; clearTimeout(el._t); el._t = setTimeout(() => el.style.opacity = 0, 1600);
}
function showCombo() {
  if (dodgeCombo < 5 || dodgeCombo % 5 !== 0) return;
  const el = $('combo'); el.textContent = '🔥 ' + dodgeCombo + ' COMBO';
  el.style.opacity = 1; clearTimeout(el._t); el._t = setTimeout(() => el.style.opacity = 0, 800);
}
function hit() {
  lives--; invuln = INVULN_TIME; shake = 0.9; dodgeCombo = 0;
  if (sparkBurst) sparkBurst.manualEmitCount = 160;

function pickupHeal(h) {
  h.metadata.active = false; h.setEnabled(false);
  if (sparkBurst) sparkBurst.manualEmitCount = 120;

  else flashToast('💚 MAX', '#46ff8c');

// ---------- main loop ----------
function update(dt) {
  const tms = performance.now();
  setStageTint(Math.min(1, dt * 1.5));   // smoothly blend scene/light tint toward the active stage
  if (phase === 'loading') {
    // calm idle while assets load: slow drift through the tunnel
    dragonRoot.position.set(0, Y_CENTER, 0);
    camera.position.set(Math.sin(tms*0.0004)*2.5, Y_CENTER + 3, -12);
    camera.rotation.z = 0;
    camera.setTarget(new BABYLON.Vector3(0, Y_CENTER, 16));
    camera.fov = 1.15;
    animateAmbient(dt, tms, BASE_SPEED*0.5);
    return;
  }
  if (phase === 'intro') return updateIntro(dt, tms);
  if (phase === 'menu') {
    // arc camera is mouse-controlled; just keep the showcase models turning
    for (const it of showcaseItems) it.spin();
    animateAmbient(dt, tms, BASE_SPEED*0.4);
    return;
  }
  if (phase !== 'playing') { animateAmbient(dt, tms, BASE_SPEED*0.5); spinHeals(dt); return; } // 'over' holds the view

  speed = Math.min(MAX_SPEED, BASE_SPEED + (distance / 100) * BASE_SPEED * 0.16);
  distance += speed * dt;
  applyStage(stageForDistance(distance), true);   // advance 1st→2nd→3rd by distance
  const dragZ = distance, boost = speed / BASE_SPEED;

  const mv = 22;
  if (keys['arrowleft'] || keys['a']) target.x -= mv*dt;
  if (keys['arrowright']|| keys['d']) target.x += mv*dt;
  if (keys['arrowup']   || keys['w']) target.y += mv*dt;
  if (keys['arrowdown'] || keys['s']) target.y -= mv*dt;
  // swipe joystick: keep gliding in the held direction until released / re-centered
  target.x += dragVX * dt;
  target.y += dragVY * dt;
  target.x = Math.max(-LANE_W, Math.min(LANE_W, target.x));
  target.y = Math.max(Y_CENTER-LANE_H, Math.min(Y_CENTER+LANE_H, target.y));

  const px = dragonRoot.position.x, py = dragonRoot.position.y;
  dragonRoot.position.x += (target.x - px) * Math.min(1, dt*12);
  dragonRoot.position.y += (target.y - py) * Math.min(1, dt*12);
  dragonRoot.position.z = dragZ;
  const vx = dragonRoot.position.x - px, vy = dragonRoot.position.y - py;

  // banking on world-aligned node: roll about Z (left/right), pitch about X (up/down)
  dragonBank.rotation.z += ((ROLL_SIGN * vx * 11) - dragonBank.rotation.z) * Math.min(1, dt*9);
  dragonBank.rotation.x += ((PITCH_SIGN * vy * 9) - dragonBank.rotation.x) * Math.min(1, dt*9);
  dragonFacing.position.y = Math.sin(tms*0.012) * 0.14;
  dragonGlow.position.copyFrom(dragonRoot.position);
  if (fireTrail) fireTrail.emitRate = 240 + boost*360;

  // camera follow + roll + shake + speed fov
  camRoll += ((-vx*1.2) - camRoll) * Math.min(1, dt*5);
  const sx = shake?(Math.random()*2-1)*shake:0, sy = shake?(Math.random()*2-1)*shake:0;
  camera.position.x += (dragonRoot.position.x*0.6 + sx - camera.position.x) * Math.min(1, dt*7);
  camera.position.y += (dragonRoot.position.y + 3.0 + sy - camera.position.y) * Math.min(1, dt*7);
  camera.position.z = dragZ - 12 - boost*0.7;
  camera.setTarget(new BABYLON.Vector3(dragonRoot.position.x*0.4, dragonRoot.position.y, dragZ + 18));
  camera.rotation.z = camRoll * 0.45;
  camera.fov = 1.15 + Math.min(0.3, (boost-1)*0.15);
  shake *= 0.85; if (shake < 0.01) shake = 0;
  if (pipeline) pipeline.chromaticAberration.aberrationAmount += (1.5 + boost*3 - pipeline.chromaticAberration.aberrationAmount) * Math.min(1, dt*4);

  if (invuln > 0) { invuln -= dt; if (dragonFacing) dragonFacing.setEnabled(Math.floor(tms/70)%2===0); }
  else if (dragonFacing) dragonFacing.setEnabled(true);
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) dodgeCombo = 0; }

  // obstacles
  for (const m of obstacles) {
    m.rotation.y += m.metadata.spin; m.rotation.x += m.metadata.spin*0.5;
    if (m.position.z < dragZ - RECYCLE_BEHIND) placeObstacle(m, dragZ + SPAWN_AHEAD);
    const dz = m.position.z - dragZ;
    if (invuln <= 0 && Math.abs(dz) < HIT_Z) {
      const dx = m.position.x - dragonRoot.position.x, dy = m.position.y - dragonRoot.position.y;
      if (dx*dx + dy*dy < HIT_R*HIT_R) { hit(); placeObstacle(m, dragZ + SPAWN_AHEAD); continue; }
    }
    if (!m.metadata.scored && dz < -0.5 && dz > -3.0) { m.metadata.scored = true; dodgeCombo++; comboTimer = 2.0; showCombo(); }
  }

  // heal spawn + pickup
  if (distance >= nextHealAt) { activateHeal(); nextHealAt = distance + 700 + Math.random()*700; }
  for (const h of heals) {
    if (!h.metadata.active) continue;
    h.rotation.y += dt*2.0; h.metadata.ring.rotation.z += dt*1.5;
    const s = 1 + Math.sin(tms*0.006)*0.12; h.scaling.set(s,s,s);
    if (h.position.z < dragZ - 6) { h.metadata.active = false; h.setEnabled(false); continue; }
    const dz = h.position.z - dragZ;
    if (Math.abs(dz) < 2.2) {
      const dx = h.position.x - dragonRoot.position.x, dy = h.position.y - dragonRoot.position.y;
      if (dx*dx + dy*dy < 5.5) pickupHeal(h);
    }
  }

  const gc = stageTgt.gate;
  for (const g of gates) {
    if (g.position.z < dragZ - 8) g.position.z += 520;
    const near = 0.35 + 0.65 * (1 - Math.min(1, Math.abs(g.position.z - dragZ)/34));
    g.material.emissiveColor.set(gc[0]*near, gc[1]*near, gc[2]*near); g.rotation.z += dt*0.3;
  }

  animateAmbient(dt, tms, speed);
  updateHud();
}

function updateIntro(dt, tms) {
  introT += dt;
  const t = Math.min(1, introT / INTRO_DUR);
  const dpos = new BABYLON.Vector3(0, Y_CENTER, 0);
  // the dragon hovers near origin, facing +Z (its front), breathing fire
  dragonRoot.position.copyFrom(dpos);
  dragonFacing.position.y = Math.sin(tms*0.01) * 0.14;
  if (fireTrail) fireTrail.emitRate = 650;
  dragonGlow.position.copyFrom(dpos);
  const faceTarget = new BABYLON.Vector3(dpos.x, Y_CENTER + 0.7, dpos.z);

  if (t < 0.62) {
    // ── HERO SHOT: camera in FRONT of the dragon, close-up of its face, slow orbit + push-in
    const u = t / 0.62;
    const ang = -0.85 + u * 1.45;       // sweep across the front
    const rad = 9.0 - u * 3.3;          // push in 9.0 -> 5.7
    camera.position.set(dpos.x + Math.sin(ang)*rad, Y_CENTER + 1.7 - u*0.7, dpos.z + Math.cos(ang)*rad);
    camera.setTarget(faceTarget);
    camera.fov = 0.92;
    dragonBank.rotation.z = Math.sin(tms*0.004) * 0.16;   // gentle idle banking
    dragonBank.rotation.x = -0.05 + Math.sin(tms*0.003) * 0.05;
  } else {
    // ── SWING AROUND to the gameplay (behind) view
    const u = (t - 0.62) / 0.38, e = 1 - Math.pow(1 - u, 2);
    const fAng = 0.6, fRad = 5.7;
    const from = new BABYLON.Vector3(dpos.x + Math.sin(fAng)*fRad, Y_CENTER + 1.0, dpos.z + Math.cos(fAng)*fRad);
    const to = new BABYLON.Vector3(0, Y_CENTER + 3, -12);
    camera.position = BABYLON.Vector3.Lerp(from, to, e);
    const tgt = BABYLON.Vector3.Lerp(faceTarget, new BABYLON.Vector3(0, Y_CENTER, 16), e);
    camera.setTarget(tgt);
    camera.fov = 0.92 + e * 0.26;
    dragonBank.rotation.z = (1 - e) * 0.16;
    dragonBank.rotation.x *= (1 - e);
  }
  animateAmbient(dt, tms, BASE_SPEED * 0.7);
  if (introT >= INTRO_DUR) enterMenu();
}

function updateMenuCam(dt, tms) {
  dragonRoot.position.set(Math.sin(tms*0.0006)*2, Y_CENTER + Math.sin(tms*0.0015)*0.3, 0);
  dragonBank.rotation.z = Math.sin(tms*0.0009)*0.12;
  dragonGlow.position.copyFrom(dragonRoot.position);
  camera.position.x += (Math.sin(tms*0.0004)*3 - camera.position.x)*Math.min(1,dt*3);
  camera.position.y += (Y_CENTER + 3 - camera.position.y)*Math.min(1,dt*3);
  camera.position.z = -13; camera.rotation.z = 0;
  camera.setTarget(new BABYLON.Vector3(dragonRoot.position.x*0.4, Y_CENTER, 16));
  camera.fov = 1.18;
}

function spinHeals(dt) { for (const h of heals) if (h.metadata.active) h.rotation.y += dt*2; }

function animateAmbient(dt, tms, spd) {
  const dragZ = dragonRoot.position.z, boost = spd / BASE_SPEED;
  for (const t of tunnelTiles) if (t.position.z + 115 < dragZ) t.position.z += 230;
  for (const s of streaks) {
    s.position.z -= spd * dt * 1.6;
    s.scaling.z = 1.5 + boost*3.5 * (0.6 + 0.4*Math.sin(tms*0.01 + (s.basePhase||0)*6));
    if (s.position.z < dragZ - 12) resetStreak(s, dragZ + SPAWN_AHEAD + Math.random()*30);
  }
}

// ---------- best score (cookie) ----------
const BEST_COOKIE = 'dragondash_best';
function getBest() {
  const m = document.cookie.match(/(?:^|;\s*)dragondash_best=(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}
function saveBest(v) {
  document.cookie = BEST_COOKIE + '=' + v + ';max-age=315360000;path=/;SameSite=Lax';
}
function renderBest() {
  const el = $('menuBest');
  if (el) el.textContent = '🏆 自己ベスト ' + getBest().toLocaleString() + ' m';
}

// ---------- roster ----------
function renderRoster() {
  const el = $('roster'); el.innerHTML = '';
  ENEMIES.forEach(e => { const c = document.createElement('span'); c.className='chip'; c.textContent = e.name; el.appendChild(c); });
}

// ---------- input ----------
addEventListener('keydown', e => {
  const k = e.key.toLowerCase(); keys[k] = true;
  if ((k === ' ' || k === 'enter')) {
    if (phase === 'intro') { introT = INTRO_DUR; }
    else if (phase === 'menu' || phase === 'over') {
      startGame();
    }
  }
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// swipe = virtual joystick: the finger's offset from where you first touched
// sets a continuous direction & speed. The dragon keeps moving that way until
// you bring your finger back toward the start (戻す) or lift it (離す).
const DRAG_MAX_SPEED   = 26;     // lane units / second at full stick deflection
const DRAG_FULL_OFFSET = 0.18;   // screen fraction of offset that = full speed
const DRAG_DEADZONE    = 0.015;  // ignore tiny jitter near the anchor
function axisVel(off) {
  let m = Math.abs(off) - DRAG_DEADZONE;
  if (m <= 0) return 0;
  m = Math.min(1, m / (DRAG_FULL_OFFSET - DRAG_DEADZONE));
  return Math.sign(off) * m * DRAG_MAX_SPEED;
}
function updateDragVel(curX, curY) {
  const r = canvas.getBoundingClientRect();
  dragVX =  axisVel((curX - anchorX) / r.width);
  dragVY = -axisVel((curY - anchorY) / r.height);   // screen-down → world-down
}
canvas.addEventListener('pointerdown', e => {
  pointerDown = true; anchorX = e.clientX; anchorY = e.clientY;
  dragVX = dragVY = 0;
  if (canvas.setPointerCapture) { try { canvas.setPointerCapture(e.pointerId); } catch (_) {} }
});
canvas.addEventListener('pointermove', e => {
  if (!pointerDown || phase !== 'playing') return;
  updateDragVel(e.clientX, e.clientY);
});
const endPointer = () => { pointerDown = false; dragVX = dragVY = 0; };
addEventListener('pointerup', endPointer);
addEventListener('pointercancel', endPointer);
// block long-press context menu / iOS callout so dragging feels native
canvas.addEventListener('contextmenu', e => e.preventDefault());

// tap-to-start: anywhere on the menu / game-over screens (buttons still work too)
const tapStart = e => { e.preventDefault(); startGame(); };
$('startScreen').addEventListener('pointerup', e => { if (phase === 'menu') tapStart(e); });
$('overScreen').addEventListener('pointerup', e => { if (phase === 'over') tapStart(e); });
$('startBtn').onclick = startGame; $('retryBtn').onclick = startGame;

// ---------- boot ----------
quickPlay = location.hash.indexOf('play') >= 0;
createScene();
renderRoster();
renderBest();
// hard fallback: never get stuck on the loading screen even if an asset stalls
setTimeout(() => { if (phase === 'loading') maybeBeginIntro(true); }, 15000);
let last = performance.now();
engine.runRenderLoop(() => {
  const now = performance.now(); const dt = Math.min(0.05, (now - last)/1000); last = now;
  update(dt); scene.render();
});
addEventListener('resize', () => engine.resize());
addEventListener('orientationchange', () => setTimeout(() => engine.resize(), 250));
if (window.visualViewport) window.visualViewport.addEventListener('resize', () => engine.resize());
</script>
